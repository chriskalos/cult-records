services:
  - type: web
    name: cult-records
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: ./build.sh
    startCommand: gunicorn cultrecords.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    domains:
      - cult.chriskalos.xyz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cult-records-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: CUSTOM_DOMAIN
        value: cult.chriskalos.xyz
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_MEDIA_MIGRATION_ORIGIN
        value: https://cult.chriskalos.xyz/media/
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: cult-records-db
    plan: free
    region: frankfurt
    databaseName: cult_records
    user: cult_records
    ipAllowList: []
