<header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" aria-label="Main navigation">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Cult Records</a>
            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#main-navigation"
                aria-controls="main-navigation"
                aria-expanded="false"
                aria-label="Toggle navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="main-navigation">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>
                </ul>

                <form action="{% url 'search:results' %}" method="get" class="d-flex my-3 my-lg-0 me-lg-3" role="search">
                    <label for="header-search" class="visually-hidden">Search the catalogue</label>
                    <input
                        id="header-search"
                        name="query"
                        type="search"
                        value="{{ request.GET.query|default:'' }}"
                        class="form-control me-2"
                        placeholder="Search catalogue"
                    >
                    <button type="submit" class="btn btn-outline-primary">Search</button>
                </form>

                {% if request.user.is_authenticated %}
                    <span class="navbar-text me-lg-3">{{ request.user.username }}</span>
                    <form action="{% url 'accounts:logout' %}" method="post" class="mt-2 mt-lg-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-secondary">Sign out</button>
                    </form>
                {% else %}
                    <div class="d-flex gap-2">
                        <a href="{% url 'accounts:login' %}" class="btn btn-outline-secondary">Sign in</a>
                        <a href="{% url 'accounts:register' %}" class="btn btn-primary">Register</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>
</header>
